<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f4f1ea;font-family:Inter,Arial,sans-serif;color:#111;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:32px 0;">
      <tr><td align="center">
        <table width="560" cellpadding="0" cellspacing="0"
               style="background:#f7f4ee;border:3px solid #111;box-shadow:6px 6px 0 0 #111;">
          <tr><td style="background:#2d6cdf;border-bottom:3px solid #111;padding:20px 28px;">
            <h1 style="margin:0;color:#fff;font-family:'Space Grotesk',Arial,sans-serif;">
              Mentorship session booked
            </h1>
          </td></tr>
          <tr><td style="padding:28px;">
            <p style="font-size:16px;">Hi {{ full_name }},</p>
            <p style="font-size:16px;line-height:1.55;">
              Your mentorship session on <strong>{{ program }}</strong> is
              scheduled for <strong>{{ scheduled_at }}</strong>.
            </p>
            <p style="font-size:16px;">Amount: <strong>₹{{ amount }}</strong></p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
